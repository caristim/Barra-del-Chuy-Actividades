<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barra del Chuy – Actividades todo el año</title>
  <link rel="stylesheet" href="style.css">
  <!-- Firebase compat (v9) -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
  <!-- Leaflet CSS y JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div class="overlay">
    <h1>Barra del Chuy</h1>
    <h2>Actividades todo el año</h2>
    <p>Tu comunidad, tus actividades, tu lugar</p>
    <button onclick="showEvents()">📅 Ver eventos</button>
    <button onclick="showForm()">➕ Agregar evento</button>
  </div>

  <!-- Lista de eventos + mapa -->
  <div id="event-list">
    <div id="event-items"></div>
    <div id="map-list"></div>
  </div>

  <!-- Formulario para agregar evento -->
  <div id="event-form" style="display:none;">
    <h3>Nuevo evento</h3>
    <input type="text" id="title" placeholder="Título del evento" required>
    <select id="category">
      <option value="cultura">🎶 Cultura y música</option>
      <option value="playa">🏖️ Playa y recreación</option>
      <option value="feria">🛍️ Ferias y mercados</option>
      <option value="comunidad">🧑‍🤝‍🧑 Reuniones comunitarias</option>
    </select>
    <input type="date" id="date" required>
    <input type="time" id="time" required>
    <textarea id="description" placeholder="Descripción" rows="3"></textarea>
    
    <!-- Subir flyer (imagen) -->
    <div class="upload-group">
      <label>📸 Flyer del evento (imagen):</label>
      <input type="file" id="flyerInput" accept="image/*">
      <small>Sube una imagen (JPG, PNG, GIF) - Máximo 5MB</small>
      <div id="uploadProgress" style="display:none; margin: 8px 0;">
        <progress id="progressBar" value="0" max="100" style="width:100%;"></progress>
        <span id="progressText">0%</span>
      </div>
      <div id="flyerPreview" style="margin: 10px 0; display:none;">
        <img id="previewImg" src="#" alt="Vista previa" style="max-width:100%; max-height:200px; border-radius:8px; border:2px solid #ff9800;">
      </div>
    </div>

    <div class="location-group">
      <label>Ubicación (lat, lng):</label>
      <input type="text" id="location" placeholder="Ej: -33.749, -53.347">
      <div id="map" style="height:300px; width:100%; margin:10px 0;"></div>
      <small>Haz clic en el mapa o arrastra el marcador para elegir la ubicación.</small>
    </div>

    <button onclick="saveEvent()">✅ Guardar evento</button>
    <button onclick="hideForm()">❌ Cancelar</button>
  </div>

  <!-- Crédito -->
  <footer style="text-align:center; padding:20px; color:rgba(255,255,255,0.7); font-size:14px; background:rgba(0,0,0,0.5); margin-top:30px;">
    Creador Carlos Aristimuño 2026
  </footer>

  <script src="script.js"></script>
</body>
</html>
