<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eventos Barra del Chuy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
  <h1>Eventos en Barra del Chuy</h1>
  <button onclick="showForm()">➕ Agregar evento</button>

  <div id="event-form" style="display:none;">
    <label>Título del evento</label>
    <input type="text" id="title" placeholder="Ej: Festival de música">

    <label>Categoría</label>
    <select id="category">
      <option value="cultura">🎶 Cultura y música</option>
      <option value="playa">🏖️ Playa y recreación</option>
      <option value="feria">🛍️ Ferias y mercados</option>
      <option value="comunidad">🤝 Reuniones comunitarias</option>
    </select>

    <label>Fecha</label>
    <input type="date" id="date">

    <label>Hora</label>
    <input type="time" id="time">

    <label>Descripción</label>
    <textarea id="description" placeholder="Breve descripción"></textarea>

    <label>Ubicación en mapa</label>
    <div id="map" style="height:300px;"></div>
    <input type="hidden" id="location">

    <button onclick="saveEvent()">Guardar evento</button>
    <button onclick="hideForm()">Cancelar</button>
  </div>

  <h2>Lista de eventos</h2>
  <ul id="event-list"></ul>

  <script src="script.js"></script>
</body>
</html>
